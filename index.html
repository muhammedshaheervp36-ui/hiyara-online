        /* MINIFIED CSS BUNDLE */
        :root {
            --bg-primary: #F5F1EB;
            --text-primary: #111111;
            --text-secondary: #444444;
            --accent-gold: #C5A059;
            --accent-gold-light: #D4AF37;
            --white: #FFFFFF;
            --black: #000000;
            --font-logo: 'Sirenik', 'Sirenik Regular', serif;
            --font-serif: 'Cormorant Garamond', serif;
            --font-heading: 'Cinzel', serif;
            --font-sans: 'Outfit', sans-serif;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 8rem;
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-serif);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .brand-logo {
            font-family: var(--font-logo);
            font-weight: 500;
            letter-spacing: 0.05em;
            font-style: normal;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }

        ::selection {
            background: var(--accent-gold);
            color: var(--white);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        /* HEADER HERO */
        .sticky-header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(245, 241, 235, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: var(--space-sm) 0;
            transition: var(--transition-smooth);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 2.5rem;
            color: var(--text-primary);
            position: relative;
            font-family: 'Sirenik', 'Sirenik Regular', serif;
        }

        .brand-logo::first-letter {
            color: var(--accent-gold);
        }

        .logo-container {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .brand-logo-img {
            height: 40px;
            max-width: 150px;
            object-fit: contain;
        }

        /* Universal Navigation Hamburger (3 Lines Menu) */
        .mobile-menu-toggle {
            display: block;
            /* Show by default on all screens */
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-primary);
        }

        .header-content {
            position: relative;
        }

        .main-nav {
            display: none;
            position: absolute;
            top: 100%;
            left: -5%;
            width: 110%;
            background: var(--bg-primary);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            padding: var(--space-md);
            z-index: 999;
        }

        .main-nav.active {
            display: block;
        }

        .main-nav ul {
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
        }

        .main-nav a {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            position: relative;
        }

        .main-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-gold);
            transition: var(--transition-smooth);
        }

        .main-nav a:hover::after {
            width: 100%;
        }

        .header-icons {
            display: flex;
            gap: var(--space-sm);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            transition: var(--transition-smooth);
        }

        .icon-btn:hover {
            color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .hero-section {
            position: relative;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #e0d9cf;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            color: var(--text-primary);
        }

        .hero-heading {
            font-size: 4.5rem;
            margin-bottom: var(--space-sm);
            max-width: 800px;
            line-height: 1.1;
        }

        .hero-subheading {
            font-size: 1.2rem;
            margin-bottom: var(--space-md);
            font-family: var(--font-sans);
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .gold-btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: 1px solid var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
        }

        .gold-btn:hover {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--white);
            transform: scale(1.05);
        }

        .btn-outline {
            display: inline-block;
            padding: 1rem 1.5rem;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
            cursor: pointer;
            text-align: center;
        }

        .btn-outline:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 1s forwards;
        }

        .slide-up-delayed {
            animation: slideUp 1s 0.3s forwards;
            opacity: 0;
        }

        .slide-up-delayed-more {
            animation: slideUp 1s 0.6s forwards;
            opacity: 0;
        }

        /* SECTIONS */
        section {
            padding: var(--space-xl) 0;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: var(--space-lg);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: var(--accent-gold);
            margin: 20px auto 0;
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .collection-card {
            cursor: pointer;
            text-align: center;
        }

        .collection-image-wrap {
            position: relative;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: var(--space-sm);
        }

        .collection-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .collection-card:hover .collection-img {
            transform: scale(1.05);
        }

        .collection-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .collection-card:hover .collection-info {
            background: rgba(255, 255, 255, 0.8);
        }

        .collection-card h3 {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.05em;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-sm);
        }

        .product-card {
            background: var(--white);
            padding: var(--space-sm);
            transition: var(--transition-smooth);
            border: 1px solid #f0f0f0;
            /* Subtle border instead of transparent for better structure */
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            transform: translateY(-5px);
        }

        .product-image-wrap {
            height: 250px;
            /* Taller image area */
            background: #fff;
            /* White background to match card */
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image-wrap img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            /* Fill wrap without stretching */
            transition: transform 0.5s ease;
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            z-index: 2;
            transition: all 0.2s ease;
            color: #ccc;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: #ff4757;
        }

        .favorite-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .product-card:hover .product-image-wrap img {
            transform: scale(1.05);
        }

        .product-info {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .product-name {
            font-family: var(--font-serif);
            font-size: 1.15rem;

            opacity: 0.5;

        .editor-panel {

            top: 0;

            padding: var(--space-md);

        }

            right: 0;

        .editor-toggle {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: var(--accent-gold);
            color: var(--white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .editor-group {
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid #eee;
        }

        .editor-group h4 {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            margin-bottom: var(--space-sm);
            color: var(--accent-gold);
        }

            margin-bottom: var(--space-sm);
        }

        .editor-field label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .editor-field input,
        .editor-field select,
        .editor-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            font-family: var(--font-sans);
        }

        .product-modal {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 3000;
            display: none;
            overflow-y: auto;
        }

        .product-modal.active {
            display: block;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        .product-gallery {
            background: #fcfcfc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .product-gallery img {
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .product-gallery img:hover {
            transform: scale(1.5);
            cursor: zoom-in;
        }

        .product-info-panel {
            padding: var(--space-xl) var(--space-lg);
        }

        .product-info-panel h1 {
            font-size: 3rem;
            margin-bottom: var(--space-sm);
        }

        .product-detail-price {
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: var(--space-md);
        }

        .product-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            line-height: normal;
        }

        .product-variants {
            margin-bottom: var(--space-lg);
        }

        .variant-group {
            margin-bottom: var(--space-sm);
        }

        .variant-options {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .variant-chip {
            padding: 8px 15px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .variant-chip.active {
            border-color: var(--accent-gold);
            background: var(--accent-gold);
            color: var(--white);
        }

        /* CART PANEL */
        .cart-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--white);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.1);
            z-index: 2500;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .cart-panel.active {
            right: 0;
        }

        .cart-header {
            padding: var(--space-md);
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
            margin: 0;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: var(--space-md);
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: var(--space-md);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-family: var(--font-serif);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .remove-item {
            color: #ff4444;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 5px;
            display: inline-block;
        }

        .cart-footer {
            padding: var(--space-md);
            border-top: 1px solid #eee;
            background: #fcfcfc;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: var(--space-md);
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--text-primary);
            color: var(--white);
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .checkout-btn:hover {
            background: var(--accent-gold);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-gold);
            color: var(--white);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* HEADER SEARCH */
        .header-search-container {
            position: relative;
            margin-left: auto;
            margin-right: 20px;
            width: 250px;
        }

        .header-search-input {
            width: 100%;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-family: var(--font-serif);
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            transition: all 0.3s ease;
        }

        .header-search-input:focus {
            background: #fff;
            box-shadow: 0 2px 10px rgba(197, 160, 89, 0.2);
            width: 300px;
            /* Expand on focus */
        }

        .header-search-results {
            position: absolute;
            top: 45px;
            right: 0;
            width: 350px;
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            padding: 10px;
            text-align: left;
        }

        .header-search-results.active {
            display: block;
        }

        .mobile-search-toggle {
            display: none;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #fcfcfc;
        }

        .search-result-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }

        .search-result-info h4 {
            margin: 0;
            font-size: 1rem;
            font-family: var(--font-serif);
        }

        .search-result-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: var(--font-serif);
            border: 1px solid var(--accent-gold);
            border-radius: 50px;
            background: var(--white);
            text-align: center;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.2);
            transform: translateY(-2px);
        }

        .search-results {
            width: 80%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            overflow-y: auto;
            max-height: 60vh;
            padding-bottom: var(--space-lg);
        }

        /* ACCOUNT DROPDOWN */
        .account-dropdown-container {
            position: relative;
        }

        .account-dropdown {
            position: absolute;
            top: 120%;
            right: 0;
            width: 200px;
            background: #fff;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1002;
            overflow: hidden;
            flex-direction: column;
        }

        .account-dropdown.active {
            display: flex;
        }

        .account-dropdown a {
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: background 0.2s;
            border-bottom: 1px solid #f5f5f5;
        }

        .account-dropdown a:last-child {
            border-bottom: none;
        }

        .account-dropdown a:hover {
            background: #f9f9f9;
            color: var(--accent-gold);
        }

        /* CONTACT SECTION */
        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
            padding: 4rem 0;
        }

        .contact-info-item {
            margin-bottom: 2rem;
        }

        .contact-info-item h4 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

            padding: 2rem;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 8px;
        }

            margin-bottom: 1.5rem;

            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);

            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.3s;

        .form-control:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

            resize: vertical;
            min-height: 120px;
        }

            }

            .footer-logo {
                font-size: 2.5rem;
            }

            .footer-logo img {
                height: 60px !important;
            }
        }

        .auth-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .auth-modal.active {
            display: flex;
        }

        .auth-content {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
        }

            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #888;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .auth-tab.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .close-auth {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }

        .toast-notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive Tweaks for index.html specifically */
        @media (max-width: 768px) {
            .header-content {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                position: relative;
            }

            .mobile-menu-toggle {
                order: -1;
                /* Move hamburger to the far left */
                margin-right: auto;
            }

            .logo-container {
                flex: 1;
                text-align: center;
                z-index: 10;
            }

            .brand-logo-img {
                height: 35px;
                /* slightly smaller to fit well on mobile */
                max-width: 140px;
                object-fit: contain;
            }

            .header-icons {
                margin-left: auto;
            }

            .gold-btn {
                padding: 0.4rem 0.8rem !important;
                /* Make Sign In button smaller */
                font-size: 0.75rem !important;
            }

            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .about-text {
                padding-right: 0;
            }

            .about-img img {
                height: 300px;
                box-shadow: 10px 10px 0 var(--accent-gold);
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .mobile-search-toggle {
                display: block;
            }

            .header-search-container {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 10px 20px;
                background: var(--bg-primary);
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                z-index: 1001;
            }

            .header-search-container.active {
                display: block;
            }

            .header-search-input {
                width: 100% !important;
            }

            .header-search-results {
                width: calc(100% - 40px);
                top: 55px;
            }

            .products-grid,
            .collections-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-sm);
            }

            .product-image-wrap {
                height: 200px;
            }

            .product-name {
                font-size: 0.9rem;
            }

            .product-price {
                font-size: 0.9rem;
                font-family: var(--font-sans), sans-serif;
            }

            .collection-image-wrap {
                height: 250px;
            }

            .collection-card h3 {
                font-size: 0.75rem;
            }

            .collection-info {
                padding: 6px 12px;
                bottom: 12px;
                white-space: normal;
                text-align: center;
                max-width: 85%;
            }
        }
    </style>
</head>

                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control" required placeholder="user@example.com" id="signupEmail">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                        </div>
                        <button type="submit" class="gold-btn" style="width: 100%;">Create Account</button>
                    </form>
                    </div>
                </div>
            `;
            },

            renderProductModal() {
                return `
                    <div class="product-modal" id="productModal">
                        <span class="close-modal" onclick="closeProduct()">&times;</span>
                        <div id="modalContent"></div>
                    </div>
                `;
            },

            renderCartPanel() {
                return `
                    <div class="cart-panel" id="cartPanel">
                        <div class="cart-header" style="display:flex; justify-content:space-between; align-items:center; padding:1.5rem; border-bottom:1px solid #eee;">
                            <h2 style="font-size:1.5rem; margin:0; font-family: var(--font-serif);">Your Bag</h2>
                            <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
                        </div>
                        <div id="cartItemsContainer" style="padding:1.5rem; overflow-y:auto; flex:1;"></div>
                        <div class="cart-footer" style="padding:1.5rem; border-top:1px solid #eee;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                                <span style="font-weight:500;">Total</span>
                                <span id="cartTotal" style="font-weight:600; font-size:1.2rem;">â‚¹0</span>
                            </div>
                            <button class="gold-btn" style="width:100%;" onclick="startCheckout()">Proceed to Checkout</button>
                        </div>
                    </div>
                `;
            },

            renderSearchOverlay() {
                return ``; // Removed Overlay
            },

            renderCheckoutModal() {
                return `
                    <div class="auth-modal" id="checkoutModal">
                        <div class="auth-content" style="max-width: 500px;">
                            <span class="close-auth" onclick="closeCheckout()">&times;</span>
                            <h2 style="margin-bottom: 1.5rem; text-align: center; font-family: var(--font-serif);">Checkout</h2>
                            <form id="checkoutForm" onsubmit="handlePlaceOrder(event)">
                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" class="form-control" required placeholder="Jane Doe">
                                </div>
                                <div class="form-group">
                                    <label>Shipping Address</label>
                                    <textarea class="form-control" required placeholder="123 Luxury Lane..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Payment Method</label>
                                    <select class="form-control">
                                        <option>Credit Card</option>
                                        <option>Cash on Delivery</option>
                                    </select>
                                </div>
                                <div style="background: #f9f9f9; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem;">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                        <span>Subtotal</span>
                                        <span id="checkoutSubtotal">â‚¹0</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                        <span>Shipping</span>
                                        <span>Free</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #ddd;">
                                        <span>Total</span>
                                        <span id="checkoutTotal">â‚¹0</span>
                                    </div>
                                </div>
                                <button type="submit" class="gold-btn" style="width: 100%;">Place Order</button>
                            </form>
                        </div>
                    </div>
                `;
            }
        };


        window.addEventListener('storage', (e) => {
            if (e.key === 'hiyara_state_v1') {
                state = JSON.parse(e.newValue);
                initApp();
            }
        });

        // Force sync on focus (fixes issues where storage event might be missed)
        window.addEventListener('focus', () => {
            const stored = localStorage.getItem('hiyara_state_v1');
            if (stored) {
                const storedState = JSON.parse(stored);
                // Simple check if state changed (comparing length of stringified json might be faster but less accurate)
                if (JSON.stringify(storedState) !== JSON.stringify(state)) {
                    state = storedState;
                    initApp();
                }
            }
        });

        window.openProduct = (id) => {
            const product = state.bestSellers.find(p => p.id === id);
            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
            < div class="product-detail-grid" >
                    <div class="product-gallery">
                        <img src="${product.img}" alt="${product.name}" onerror="this.onerror=null; this.src=window.fallbackImg;">
                    </div>
                    <div class="product-info-panel">
                        <h1>${product.name}</h1>
                        <p class="product-detail-price">${product.price}</p>
                        <div class="product-description">
                            Premium quality ${product.category.toLowerCase()} crafted from ethically sourced materials.
                        </div>
                        <div class="product-variants">
                            <div class="variant-group">
                                <label>Size</label>
                                <div class="variant-options">
                                    <div class="variant-chip active">Standard</div>
                                    <div class="variant-chip">Custom</div>
                                </div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button class="btn-outline" style="flex: 1" onclick="addToCart(${product.id})">Add to Bag</button>
                            <button class="gold-btn" style="flex: 1" onclick="buyNow(${product.id})">Buy Now</button>
                        </div>
                    </div>
                </div >
            `;
            modal.classList.add('active');
        };

        window.closeProduct = () => {
            document.getElementById('productModal').classList.remove('active');
        };

        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            if (nav) {
                nav.classList.toggle('active');
            }
        }

        window.onclick = function (event) {
            const authModal = document.getElementById('authModal');
            if (event.target === authModal) {
                closeAuthModal();
            }
        }

        window.toggleCart = () => {
            const panel = document.getElementById('cartPanel');
            if (panel) panel.classList.toggle('active');
        };

        window._addItemToState = (id) => {
            if (!state.cart) state.cart = [];
            const product = state.bestSellers.find(p => p.id === id);
            // Check if already in cart? (Optional, currently allows duplicates which is fine for quantity)
            state.cart.push(product);
            localStorage.setItem('hiyara_state_v1', JSON.stringify(state));
            return product;
        };

        window.showToast = (message) => {
            let toast = document.getElementById('toastNotification');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toastNotification';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ${message}`;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        };

        window.addToCart = (event, id) => {
            // Handle when called from modal without event
            if (event && event.stopPropagation) {
                event.stopPropagation();
            }
            const productId = typeof event === 'number' ? event : id;

            const product = state.bestSellers.find(p => p.id === productId);
            if (!product) return;

            // Check if already in cart
            if (!state.cart) state.cart = [];
            const cartItem = state.cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.quantity += 1;
            } else {
                state.cart.push({ ...product, quantity: 1 });
            }

            saveState();
            initApp();
            showToast(`${product.name} added to cart!`);
            closeProduct(); // close modal if open
        };

        window.toggleFavorite = (event, productId) => {
            event.stopPropagation(); // Prevent opening product details
            if (!state.favorites) state.favorites = [];

            const index = state.favorites.indexOf(productId);
            if (index > -1) {
                state.favorites.splice(index, 1);
            } else {
                state.favorites.push(productId);
            }

            saveState();
            initApp(); // Changed from renderApp() to initApp() for full re-render
        };

        window.buyNow = (id) => {
            const product = _addItemToState(id);
            closeProduct();
            initApp();
            toggleCart(); // Open cart immediately
        };

        window.removeFromCart = (index) => {
            state.cart.splice(index, 1);
            localStorage.setItem('hiyara_state_v1', JSON.stringify(state));
            initApp(); // Re-render

            // Keep cart open
            setTimeout(() => {
                const panel = document.getElementById('cartPanel');
                if (panel) panel.classList.add('active');
            }, 50);
        };

        window.toggleSearch = () => {
            // Disabled
        };

        // AUTHENTICATION LOGIC
        window.openAuthModal = () => {
            document.getElementById('authModal').classList.add('active');
        };

        window.closeAuthModal = () => {
            document.getElementById('authModal').classList.remove('active');
        };

        window.switchAuthTab = (tab) => {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));

            if (tab === 'signin') {
                tabs[0].classList.add('active');
                document.getElementById('signinForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            // Simulate login
            const email = e.target.querySelector('input[type="email"]').value;
            const name = email.split('@')[0]; // Simple mock

            state.currentUser = { name: name, email: email };
            localStorage.setItem('hiyara_state_v1', JSON.stringify(state));

            closeAuthModal();
            initApp();
            // alert('Welcome back, ' + name + '!');
        };

        window.handleSignup = (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;

            state.currentUser = { name: name, email: email };
            localStorage.setItem('hiyara_state_v1', JSON.stringify(state));

            closeAuthModal();
            initApp();
            alert('Account created successfully!');
        };

        window.handleLogout = () => {
            if (confirm('Are you sure you want to log out?')) {
                state.currentUser = null;
                localStorage.setItem('hiyara_state_v1', JSON.stringify(state));
                initApp();
            }
        };

        window.toggleMobileMenu = () => {
            const nav = document.getElementById('mainNav');
            if (nav) nav.classList.toggle('active');
        };

        window.toggleAccount = () => {
            const dropdown = document.getElementById('accountDropdown');
            if (dropdown) dropdown.classList.toggle('active');
        };

        // Close account dropdown on click outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.account-dropdown-container')) {
                const dropdown = document.getElementById('accountDropdown');
                if (dropdown) dropdown.classList.remove('active');
            }
        });





        // CHECKOUT LOGIC
        window.startCheckout = () => {
            if (!state.cart || state.cart.length === 0) {
                alert('Your bag is empty!');
                return;
            }

            // Calculate Total
            const total = state.cart.reduce((sum, item) => {
                const price = parseInt(item.price.replace(/[^0-9]/g, ''));
                return sum + price;
            }, 0);

            const formattedTotal = 'â‚¹' + total.toLocaleString();

            // Populate Modal
            document.getElementById('checkoutSubtotal').innerText = formattedTotal;
            document.getElementById('checkoutTotal').innerText = formattedTotal;

            // Close Cart & Open Modal
            toggleCart();
            document.getElementById('checkoutModal').classList.add('active');
        };

        window.closeCheckout = () => {
            document.getElementById('checkoutModal').classList.remove('active');
        };

        window.handlePlaceOrder = (e) => {
            e.preventDefault();

            // Simulate processing
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Processing...';
            btn.disabled = true;

            setTimeout(() => {
                // Success
                state.cart = [];
                localStorage.setItem('hiyara_state_v1', JSON.stringify(state));

                alert('Thank you! Your order has been placed successfully. We will contact you shortly.');

                closeCheckout();
                initApp();
            }, 1500);
        };

        window.performSearch = () => {
            const query = document.getElementById('headerSearchInput').value.toLowerCase();
            const resultsContainer = document.getElementById('headerSearchResults');

            if (query.length < 2) {
                resultsContainer.innerHTML = '';
                resultsContainer.classList.remove('active');
                return;
            }


            const results = state.bestSellers.filter(p =>
                p.name.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query)
            );

            if (results.length > 0) {
                resultsContainer.classList.add('active');
                resultsContainer.innerHTML = results.map(product => `
            < div class="search-result-item" onclick = "openProduct(${product.id})" >
                <img src="${product.img}" alt="${product.name}" onerror="this.onerror=null; this.src=window.fallbackImg;">
                    <div class="search-result-info">
                        <h4>${product.name}</h4>
                        <p>${product.price}</p>
                    </div>
                </div>
        `).join('');

                // Close on click outside
                document.addEventListener('click', function (e) {
                    if (!e.target.closest('.header-search-container')) {
                        resultsContainer.classList.remove('active');
                    }
                }, { once: true });

            } else {
                resultsContainer.classList.add('active');
                resultsContainer.innerHTML = '<p style="padding:10px; color:#888;">No results found.</p>';
            }
        };




        let currentCategoryFilter = 'All';

        function filterProductsByCategory(category) {
            currentCategoryFilter = category;
            const shopSection = document.getElementById('shop');
            if (shopSection) {
                shopSection.outerHTML = components.renderBestSellers();
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function initApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                ${components.renderHeader()}
        <main>
            ${components.renderHero()}
            ${components.renderCollections()}
            ${components.renderBestSellers()}
            ${components.renderAbout()}
            ${components.renderContact()}
            ${components.renderNewsletter()}
        </main>
                ${components.renderFooter()}
                ${components.renderProductModal()}
                ${components.renderAuthModal()}
                ${components.renderCartPanel()}
                ${components.renderCheckoutModal()}
                ${components.renderSearchOverlay()}
        `;

            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            const totalEl = document.getElementById('cartTotal');

            if (!state.cart || state.cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding: 2rem;">Your bag is empty.</p>';
                if (totalEl) totalEl.innerText = 'â‚¹0';
                return;
            }

            let total = 0;

            // Minimalist Design
            container.innerHTML = state.cart.map((item, index) => {
                const price = parseInt(item.price.replace(/[^0-9]/g, ''));
                total += price;

                return `
            < div class="cart-item" style = "display: flex; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f5f5f5; align-items: start;" >
                    <div style="width: 80px; height: 80px; background: #f9f9f9; border-radius: 8px; overflow: hidden; list-style: none;">
                        <img src="${item.img}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
                            <h4 style="font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 1rem; color: #333; margin: 0;">${item.name}</h4>
                            <span style="font-weight: 600; color: #333;">${item.price}</span>
                        </div>
                        
                        <p style="font-size: 0.8rem; color: #888; margin-bottom: 0.75rem;">${item.category}</p>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div class="qty-selector" style="display: flex; align-items: center; gap: 10px; border: 1px solid #eee; border-radius: 4px; padding: 2px 8px;">
                                <button style="border: none; background: none; color: #888; cursor: pointer; padding: 0 5px;">-</button>
                                <span style="font-size: 0.9rem; font-weight: 500;">1</span>
                                <button style="border: none; background: none; color: #888; cursor: pointer; padding: 0 5px;">+</button>
                            </div>
                            
                            <button onclick="removeFromCart(${index})" style="border: none; background: none; color: #999; font-size: 0.8rem; cursor: pointer; text-decoration: underline;">Remove</button>
                        </div>
                        
                        <div style="margin-top: 0.5rem; font-size: 0.85rem; color: #666; text-align: right;">
                            Subtotal: <span style="font-weight: 500; color: #333;">${item.price}</span>
                        </div>
                    </div>
                </div >
            `;
            }).join('');

            if (totalEl) totalEl.innerText = 'â‚¹' + total.toLocaleString();
        }

        // Adding Render Footer implementation to components object dynamically to fix missing footer
        components.renderFooter = () => `
            <footer class="main-footer">
                <div class="container footer-grid">
                    <div class="footer-info">
                        <span class="brand-logo footer-logo" style="display: block; margin-bottom: 1rem;">
                            ${state.header.logoImg ? `<img src="${state.header.logoImg}" alt="${state.header.logo}" style="height: 100px; filter: brightness(0) invert(1);">` : state.header.logo}
                        </span>
                        <p>Elevating the art of jewelry with timeless sophistication.</p>
                    </div>
                    <div class="footer-links">
                        <h4>Shop</h4>
                        <ul>
                            <li><a href="#">Necklaces</a></li>
                            <li><a href="#">Earrings</a></li>
                            <li><a href="#">Rings</a></li>
                        </ul>
                    </div>
                    <div class="footer-links">
                        <h4>Company</h4>
                        <ul>
                            <li><a href="#">About Us</a></li>
                            <li><a href="#">Craftsmanship</a></li>
                        </ul>
                    </div>
                    <div class="footer-links">
                        <h4>Support</h4>
                        <ul>
                            <li><a href="#">Contact</a></li>
                            <li><a href="#">Shipping</a></li>
                        </ul>
                    </div>
                    <div class="footer-links">
                        <h4>Connect</h4>
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <!-- Instagram -->
                            <a href="${state.social && state.social.instagram ? state.social.instagram : '#'}" target="_blank" rel="noopener noreferrer" style="color: #fff; background: #333; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s ease;" onmouseover="this.style.background='var(--accent-gold)'; this.style.transform='scale(1.1)';" onmouseout="this.style.background='#333'; this.style.transform='scale(1)';">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                            </a>
                            <!-- WhatsApp -->
                            <a href="${state.social && state.social.whatsapp ? state.social.whatsapp : '#'}" target="_blank" rel="noopener noreferrer" style="color: #fff; background: #333; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s ease;" onmouseover="this.style.background='var(--accent-gold)'; this.style.transform='scale(1.1)';" onmouseout="this.style.background='#333'; this.style.transform='scale(1)';">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </a>
                            <!-- Facebook -->
                            <a href="${state.social && state.social.facebook ? state.social.facebook : '#'}" target="_blank" rel="noopener noreferrer" style="color: #fff; background: #333; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s ease;" onmouseover="this.style.background='var(--accent-gold)'; this.style.transform='scale(1.1)';" onmouseout="this.style.background='#333'; this.style.transform='scale(1)';">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                            </a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 Hiyara Jewelry. All Rights Reserved.</p>
                </div>
            </footer >
        `;

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
