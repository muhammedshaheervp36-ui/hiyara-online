<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiyara | Timeless Luxury Jewelry</title>
    <meta name="description" content="Discover Hiyara - Premium luxury jewelry crafted with timeless elegance.">

    <!-- Global Error Handler -->
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            document.body.innerHTML += `<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:999999;font-size:24px;"><b>JS Error:</b> ${msg}<br>Line: ${lineNo} Col: ${columnNo}</div>`;
            return false;
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500;600&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* MINIFIED CSS BUNDLE */
        :root {
            --bg-primary: #F5F1EB;
            --text-primary: #111111;
            --text-secondary: #444444;
            --accent-gold: #C5A059;
            --accent-gold-light: #D4AF37;
            --white: #FFFFFF;
            --black: #000000;
            --font-serif: 'Sirenik', 'Sirenik Regular', serif;
            --font-heading: 'Cinzel', serif;
            --font-sans: 'Outfit', sans-serif;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 8rem;
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-serif);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            letter-spacing: 0.05em;
            font-style: italic;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }

        ::selection {
            background: var(--accent-gold);
            color: var(--white);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        /* HEADER HERO */
        .sticky-header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(245, 241, 235, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: var(--space-sm) 0;
            transition: var(--transition-smooth);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-size: 2.5rem;
            color: var(--text-primary);
            position: relative;
            font-family: 'Sirenik', 'Sirenik Regular', serif;
        }

        .brand-logo::first-letter {
            font-style: italic;
            color: var(--accent-gold);
        }

        .logo-container {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .brand-logo-img {
            height: 40px;
            max-width: 150px;
            object-fit: contain;
        }

        /* Universal Navigation Hamburger (3 Lines Menu) */
        .mobile-menu-toggle {
            display: block;
            /* Show by default on all screens */
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-primary);
        }

        .header-content {
            position: relative;
        }

        .main-nav {
            display: none;
            position: absolute;
            top: 100%;
            left: -5%;
            width: 110%;
            background: var(--bg-primary);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            padding: var(--space-md);
            z-index: 999;
        }

        .main-nav.active {
            display: block;
        }

        .main-nav ul {
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
        }

        .main-nav a {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            position: relative;
        }

        .main-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-gold);
            transition: var(--transition-smooth);
        }

        .main-nav a:hover::after {
            width: 100%;
        }

        .header-icons {
            display: flex;
            gap: var(--space-sm);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            transition: var(--transition-smooth);
        }

        .icon-btn:hover {
            color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .hero-section {
            position: relative;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #e0d9cf;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            color: var(--text-primary);
        }

        .hero-heading {
            font-size: 4.5rem;
            margin-bottom: var(--space-sm);
            max-width: 800px;
            line-height: 1.1;
        }

        .hero-subheading {
            font-size: 1.2rem;
            margin-bottom: var(--space-md);
            font-family: var(--font-sans);
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .gold-btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: 1px solid var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
        }

        .gold-btn:hover {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--white);
            transform: scale(1.05);
        }

        .btn-outline {
            display: inline-block;
            padding: 1rem 1.5rem;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
            cursor: pointer;
            text-align: center;
        }

        .btn-outline:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 1s forwards;
        }

        .slide-up-delayed {
            animation: slideUp 1s 0.3s forwards;
            opacity: 0;
        }

        .slide-up-delayed-more {
            animation: slideUp 1s 0.6s forwards;
            opacity: 0;
        }

        /* SECTIONS */
        section {
            padding: var(--space-xl) 0;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: var(--space-lg);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: var(--accent-gold);
            margin: 20px auto 0;
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .collection-card {
            position: relative;
            height: 450px;
            overflow: hidden;
            cursor: pointer;
        }

        .collection-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .collection-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-md);
            transition: var(--transition-smooth);
        }

        .collection-card:hover .collection-img {
            transform: scale(1.1);
        }

        .collection-card:hover .collection-overlay {
            background: rgba(0, 0, 0, 0.4);
        }

        .collection-card h3 {
            color: var(--white);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .collection-card span {
            color: var(--accent-gold-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-sm);
        }

        .product-card {
            background: var(--white);
            padding: var(--space-sm);
            transition: var(--transition-smooth);
            border: 1px solid #f0f0f0;
            /* Subtle border instead of transparent for better structure */
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            transform: translateY(-5px);
        }

        .product-image-wrap {
            height: 250px;
            /* Taller image area */
            background: #fff;
            /* White background to match card */
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image-wrap img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            /* Fill wrap without stretching */
            transition: transform 0.5s ease;
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            z-index: 2;
            transition: all 0.2s ease;
            color: #ccc;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: #ff4757;
        }

        .favorite-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .product-card:hover .product-image-wrap img {
            transform: scale(1.05);
        }

        .product-info {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .product-name {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .product-price {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .add-to-cart-simple {
            margin-top: auto;
            /* Push to bottom */
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--text-primary);
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .add-to-cart-simple:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: var(--space-xl);
        }

        .about-text {
            padding-right: var(--space-lg);
        }

        .about-text h2 {
            font-size: 3.5rem;
            margin-bottom: var(--space-md);
            line-height: 1.1;
        }

        .brand-story {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
        }

        .about-img img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            box-shadow: 20px 20px 0 var(--accent-gold);
        }

        .newsletter-section {
            background: #111111;
            color: var(--bg-primary);
            text-align: center;
            padding: var(--space-xl) 0;
        }

        .newsletter-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter-content h2 {
            font-size: 2.5rem;
            margin-bottom: var(--space-sm);
        }

        .newsletter-form {
            margin-top: var(--space-md);
            display: flex;
            gap: 10px;
        }

        .newsletter-input {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: 1px solid rgba(245, 241, 235, 0.3);
            color: var(--bg-primary);
            font-family: var(--font-sans);
        }

        .newsletter-btn {
            padding: 1rem 2rem;
            background: var(--accent-gold);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition-smooth);
        }

        .newsletter-btn:hover {
            background: var(--accent-gold-light);
        }

        .main-footer {
            background: var(--black);
            color: var(--bg-primary);
            padding: var(--space-xl) 0 var(--space-md);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: var(--space-lg);
        }

        .footer-logo {
            font-size: 3.5rem;
            margin-bottom: var(--space-md);
            display: block;
        }

        .footer-links h4 {
            margin-bottom: var(--space-md);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--accent-gold);
        }

        .footer-links li {
            margin-bottom: 0.8rem;
        }

        .footer-links a {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--accent-gold);
        }

        .footer-bottom {
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            border-top: 1px solid rgba(245, 241, 235, 0.1);
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* EDITOR & MODAL */
        .editor-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: var(--white);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            transition: var(--transition-smooth);
            padding: var(--space-md);
            overflow-y: auto;
        }

        .editor-panel.active {
            right: 0;
        }

        .editor-toggle {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: var(--accent-gold);
            color: var(--white);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .editor-group {
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid #eee;
        }

        .editor-group h4 {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            margin-bottom: var(--space-sm);
            color: var(--accent-gold);
        }

        .editor-field {
            margin-bottom: var(--space-sm);
        }

        .editor-field label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .editor-field input,
        .editor-field select,
        .editor-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            font-family: var(--font-sans);
        }

        .product-modal {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 3000;
            display: none;
            overflow-y: auto;
        }

        .product-modal.active {
            display: block;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        .product-gallery {
            background: #fcfcfc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .product-gallery img {
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .product-gallery img:hover {
            transform: scale(1.5);
            cursor: zoom-in;
        }

        .product-info-panel {
            padding: var(--space-xl) var(--space-lg);
        }

        .product-info-panel h1 {
            font-size: 3rem;
            margin-bottom: var(--space-sm);
        }

        .product-detail-price {
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: var(--space-md);
        }

        .product-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            line-height: normal;
        }

        .product-variants {
            margin-bottom: var(--space-lg);
        }

        .variant-group {
            margin-bottom: var(--space-sm);
        }

        .variant-options {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .variant-chip {
            padding: 8px 15px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .variant-chip.active {
            border-color: var(--accent-gold);
            background: var(--accent-gold);
            color: var(--white);
        }

        /* CART PANEL */
        .cart-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--white);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.1);
            z-index: 2500;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .cart-panel.active {
            right: 0;
        }

        .cart-header {
            padding: var(--space-md);
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
            margin: 0;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: var(--space-md);
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: var(--space-md);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-family: var(--font-serif);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .remove-item {
            color: #ff4444;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 5px;
            display: inline-block;
        }

        .cart-footer {
            padding: var(--space-md);
            border-top: 1px solid #eee;
            background: #fcfcfc;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: var(--space-md);
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--text-primary);
            color: var(--white);
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .checkout-btn:hover {
            background: var(--accent-gold);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-gold);
            color: var(--white);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* HEADER SEARCH */
        .header-search-container {
            position: relative;
            margin-left: auto;
            margin-right: 20px;
            width: 250px;
        }

        .header-search-input {
            width: 100%;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-family: var(--font-serif);
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            transition: all 0.3s ease;
        }

        .header-search-input:focus {
            background: #fff;
            box-shadow: 0 2px 10px rgba(197, 160, 89, 0.2);
            width: 300px;
            /* Expand on focus */
        }

        .header-search-results {
            position: absolute;
            top: 45px;
            right: 0;
            width: 350px;
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            padding: 10px;
            text-align: left;
        }

        .header-search-results.active {
            display: block;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #fcfcfc;
        }

        .search-result-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }

        .search-result-info h4 {
            margin: 0;
            font-size: 1rem;
            font-family: var(--font-serif);
        }

        .search-result-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .search-input {
            width: 100%;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: var(--font-serif);
            border: 1px solid var(--accent-gold);
            border-radius: 50px;
            background: var(--white);
            text-align: center;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.2);
            transform: translateY(-2px);
        }

        .search-results {
            width: 80%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            overflow-y: auto;
            max-height: 60vh;
            padding-bottom: var(--space-lg);
        }

        /* ACCOUNT DROPDOWN */
        .account-dropdown-container {
            position: relative;
        }

        .account-dropdown {
            position: absolute;
            top: 120%;
            right: 0;
            width: 200px;
            background: #fff;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1002;
            overflow: hidden;
            flex-direction: column;
        }

        .account-dropdown.active {
            display: flex;
        }

        .account-dropdown a {
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: background 0.2s;
            border-bottom: 1px solid #f5f5f5;
        }

        .account-dropdown a:last-child {
            border-bottom: none;
        }

        .account-dropdown a:hover {
            background: #f9f9f9;
            color: var(--accent-gold);
        }

        /* CONTACT SECTION */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
            padding: 4rem 0;
        }

        .contact-info-item {
            margin-bottom: 2rem;
        }

        .contact-info-item h4 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .contact-form {
            background: #fff;
            padding: 2rem;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-logo {
                font-size: 2.5rem;
            }

            .footer-logo img {
                height: 60px !important;
            }
        }

        /* AUTH MODAL */
        .auth-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .auth-modal.active {
            display: flex;
        }

        .auth-content {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #888;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .auth-tab.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .close-auth {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }

        .toast-notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive Tweaks for index.html specifically */
        @media (max-width: 768px) {
            .header-content {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                position: relative;
            }

            .mobile-menu-toggle {
                order: -1;
                /* Move hamburger to the far left */
                margin-right: auto;
            }

            .logo-container {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
            }

            .brand-logo-img {
                height: 35px;
                /* slightly smaller to fit well on mobile */
                max-width: 140px;
                object-fit: contain;
            }

            .header-icons {
                margin-left: auto;
            }

            .gold-btn {
                padding: 0.4rem 0.8rem !important;
                /* Make Sign In button smaller */
                font-size: 0.75rem !important;
            }

            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .about-text {
                padding-right: 0;
            }

            .about-img img {
                height: 300px;
                box-shadow: 10px 10px 0 var(--accent-gold);
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .header-search-container {
                display: none;
                /* Hide heavy search bar on mobile, rely on navigation */
            }

            .products-grid,
            .collections-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-sm);
            }

            .product-image-wrap {
                height: 200px;
            }

            .product-name {
                font-size: 0.9rem;
            }

            .product-price {
                font-size: 0.9rem;
            }

            .collection-card {
                height: 250px;
            }
        }
    </style>
</head>
